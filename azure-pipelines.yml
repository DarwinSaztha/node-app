trigger:
- main

pool:
  name: Default

variables:
  appName: 'darsasapp'

steps:

- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

- script: |
    npm install
  displayName: 'Install dependencies'

- powershell: |
    Compress-Archive -Path * -DestinationPath app.zip
  displayName: 'Archive project'

- task: AzureWebApp@1
  inputs:
    azureSubscription: 'azure-conn-node-app'
    appName: 'darsasapp'
    package: app.zip